<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 추첨기</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <h1>🎰 로또 추첨기</h1>
    <p class="subtitle">1~45 중 6개 번호를 자동으로 추첨합니다</p>

    <div class="balls-container" id="ballsContainer">
      <div class="ball-slot" id="slot0"></div>
      <div class="ball-slot" id="slot1"></div>
      <div class="ball-slot" id="slot2"></div>
      <div class="ball-slot" id="slot3"></div>
      <div class="ball-slot" id="slot4"></div>
      <div class="ball-slot" id="slot5"></div>
      <div class="plus">+</div>
      <div class="ball-slot bonus" id="slotBonus"></div>
    </div>

    <button class="draw-btn" id="drawBtn" onclick="drawLotto()">
      추첨 시작!
    </button>

    <div class="history" id="history">
      <h2>추첨 기록</h2>
      <ul id="historyList"></ul>
    </div>
  </div>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
